<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout">

<div th:fragment="conteudo">

    
    <div class="index-bg">

        
        <div id="carouselBiblioteca"
             class="carousel slide mb-5"
             data-bs-ride="carousel"
             data-bs-interval="3000"
             data-bs-pause="false">

            <div class="carousel-inner rounded shadow">

                <div class="carousel-item active">
                    <img th:src="@{/img/livro1.jpg}" class="d-block w-100" alt="Livro 1">
                    <div class="carousel-caption">
                        <h3>Bem-vindo ao Sistema</h3>
                        <p>Gerencie sua biblioteca com facilidade</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img th:src="@{/img/livro2.jpg}" class="d-block w-100" alt="Livro 2">
                    <div class="carousel-caption">
                        <h3>Controle de Livros</h3>
                        <p>Cadastro rápido e eficiente</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img th:src="@{/img/livro3.jpg}" class="d-block w-100" alt="Livro 3">
                    <div class="carousel-caption">
                        <h3>Empréstimos Organizados</h3>
                        <p>Gerencie entradas e devoluções</p>
                    </div>
                </div>

            </div>

            
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselBiblioteca" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselBiblioteca" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

        
        <div class="text-center">
            <h2 class="fw-bold">Sistema de Gerenciamento de Biblioteca</h2>
            <p class="lead">Organize livros, usuários e empréstimos em um só lugar.</p>
        </div>

    </div> 

</div>
</html>
