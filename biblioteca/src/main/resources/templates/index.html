<div id="carouselLivros"
     class="carousel slide shadow rounded"
     data-bs-ride="carousel"
     data-bs-interval="3000">

    <div class="carousel-inner">

        <div class="carousel-item active">
           <img th:src="@{/img/livro1.jpg}" class="d-block w-25 img-fluid">
        </div>

        <div class="carousel-item">
            <img th:src="@{/img/livro2.jpg}" class="d-block w-25 img-fluid">
        </div>

        <div class="carousel-item">
            <img th:src="@{/img/livro3.jpg}" class="d-block w-25 img-fluid">
        </div>

    </div>

    <button class="carousel-control-prev" type="button"
            data-bs-target="#carouselLivros" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button"
            data-bs-target="#carouselLivros" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>
