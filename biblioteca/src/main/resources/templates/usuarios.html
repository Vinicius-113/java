<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout">

<div th:fragment="conteudo">

    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center rounded-top-4">
            <h4 class="mb-0">
                <i class="bi bi-people-fill"></i> Lista de Usuários
            </h4>

            <a th:href="@{/usuarios/novo}" class="btn btn-light btn-sm fw-bold">
                <i class="bi bi-plus-circle"></i> Novo Usuário
            </a>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th style="width: 200px;">Ações</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}" class="fw-bold text-secondary"></td>

                        <td th:text="${usuario.nome}" class="text-capitalize"></td>

                        <td>
                            <a th:href="@{/usuarios/{id}/editar(id=${usuario.id})}"
   class="btn btn-warning btn-sm me-2">

   
    <i class="bi bi-pencil-square"></i> Editar
</a>

<a th:href="@{/usuarios/{id}/delete(id=${usuario.id})}"
   class="btn btn-dark btn-sm"
   onclick="return confirm('Tem certeza que deseja excluir?')">
    <i class="bi bi-trash"></i> Excluir
</a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="3" class="text-muted">
                            Nenhum usuário cadastrado.
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>


</html>
