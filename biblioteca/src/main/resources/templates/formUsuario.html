<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout">

<div th:fragment="conteudo">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0 rounded-5">

                <div class="card-header bg-dark text-white rounded-top-5">
                    <h4 class="mb-0"
                        th:text="${usuario.id} != null ? 'Editar Usuário' : 'Novo Usuário'">
                    </h4>
                </div>

                <div class="card-body p-4">

                    <form th:action="${usuario.id} != null 
                                     ? @{/usuarios/{id}/editar(id=${usuario.id})} 
                                     : @{/usuarios}"
                          th:object="${usuario}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nome</label>
                            <input type="text"
                                   th:field="*{nome}"
                                   class="form-control rounded-pill"
                                   placeholder="Digite o nome"
                                   required>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/usuarios}"
                               class="btn btn-secondary rounded-pill">
                                Voltar
                            </a>

                            <button type="submit"
                                    class="btn btn-success rounded-pill px-4"
                                    th:text="${usuario.id} != null ? 'Atualizar' : 'Salvar'">
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>
</html>
